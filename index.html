<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gasolinnaaaa</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: black;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  perspective: 1200px;
  overflow: hidden;
}

/* ORBIT */
.orbit {
  position: relative;
  width: 300px;
  height: 300px;
  transform-style: preserve-3d;
}

/* 3D POSITION LAYER */
.item {
  position: absolute;
  top: 50%;
  left: 50%;
  transform-style: preserve-3d;
}

/* VISUAL CARD */
.card {
  width: 180px;
  height: 260px;
  border-radius: 16px;
  overflow: hidden;
  transition: all 0.5s ease;
}

.card img,
.card video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* INACTIVE */
.inactive .card {
  transform: scale(0.5);
  opacity: 0.3;
}

/* ACTIVE */
.active .card {
  transform: scale(1);
  width: 300px;
  height: 500px;
  box-shadow: 0 0 40px rgba(255,0,150,0.6);
}

</style>
</head>

<body>

<div class="orbit" id="orbit">

  <!-- VIDEO -->
  <div class="item" data-type="video">
    <div class="card">
      <video id="video" src="farewell.mp4" muted loop playsinline></video>
    </div>
  </div>

  <!-- IMAGES -->
  <div class="item"><div class="card"><img src="image.png"></div></div>
  <div class="item"><div class="card"><img src="image.png"></div></div>
  <div class="item"><div class="card"><img src="image.png"></div></div>
  <div class="item"><div class="card"><img src="image.png"></div></div>
  <div class="item"><div class="card"><img src="image.png"></div></div>
  <div class="item"><div class="card"><img src="image.png"></div></div>
  <div class="item"><div class="card"><img src="image.png"></div></div>
  <div class="item"><div class="card"><img src="image.png"></div></div>
  <div class="item"><div class="card"><img src="image.png"></div></div>

</div>

<script>
const orbit = document.getElementById("orbit");
const items = document.querySelectorAll(".item");
const video = document.getElementById("video");

let angle = 0;
const total = items.length;
const step = 360 / total;

let hasUserInteracted = false;
window.addEventListener("click", () => {
  hasUserInteracted = true;
}, { once: true });

/* POSITION IN CIRCLE */
function layout() {
  items.forEach((item, i) => {
    const theta = step * i;
    item.style.transform =
      `rotateY(${theta}deg) translateZ(400px)`;
  });
}
layout();

/* SCROLL ROTATE */
window.addEventListener("wheel", (e) => {
  angle += e.deltaY * 0.2;
  orbit.style.transform = `rotateY(${angle}deg)`;
  update();
});

/* ACTIVE DETECTION */
function update() {
  let index = Math.round((-angle / step) % total);
  if (index < 0) index += total;

  items.forEach((item, i) => {
    item.classList.remove("active", "inactive");

    if (i === index) {
      item.classList.add("active");
      handleVideo(item);
    } else {
      item.classList.add("inactive");
    }
  });
}

/* VIDEO CONTROL */
function handleVideo(item) {
  const isVideo = item.dataset.type === "video";

  if (!isVideo) {
    video.pause();
    return;
  }

  if (!hasUserInteracted) return;

  const playPromise = video.play();
  if (playPromise) {
    playPromise.catch(() => {});
  }
}

update();
</script>

</body>
</html>
