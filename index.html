<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gasolinnaaaa</title>
  <link rel="icon" href="heart.svg" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at center, #0a0a0a, #000);
      height: 100vh;
      height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      perspective: 1400px;
      overflow: hidden;
      font-family: sans-serif;
    }

    .container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    /* 🌌 Glow layer */
    .container::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(255,0,150,0.08), transparent 60%);
      pointer-events: none;
    }

    /* 🌍 ORBIT */
    .orbit {
      position: absolute;
      top: 50%;
      left: 50%;
      transform-style: preserve-3d;
      transform: translate(-50%, -50%);
      width: 300px;
      height: 300px;
      transition: transform 0.9s cubic-bezier(.17,.67,.18,1.01);
    }

    /* 🪐 ITEMS */
    .item {
      position: absolute;
      width: 180px;
      height: 260px;
      top: 50%;
      left: 50%;
      transform-style: preserve-3d;
      border-radius: 18px;
      overflow: hidden;
      transition: all 0.6s ease;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }

    .item img,
    .item video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* inactive planets */
    .inactive {
      transform: scale(0.5);
      opacity: 0.3;
      filter: blur(1px);
    }

    /* 🌟 active center */
    .active {
      width: 100%;
      height: 100%;
      z-index: 10;
      box-shadow: 0 0 40px rgba(255, 0, 150, 0.5),
                  0 0 80px rgba(0, 200, 255, 0.3);
    }

    /* 🎓 title overlay */
    .title {
      position: absolute;
      top: 40px;
      width: 100%;
      text-align: center;
      font-size: 20px;
      color: white;
      letter-spacing: 2px;
      opacity: 0.8;
    }

  </style>
</head>

<body>

<div class="container">

  <div class="title">✨ SENIOR FAREWELL ✨</div>

  <div class="orbit" id="orbit">

    <!-- VIDEO -->
    <div class="item" data-type="video">
      <video id="video" src="farewell.mp4" loop muted playsinline></video>
    </div>

    <!-- IMAGES -->
    <div class="item"><img src="image.png"></div>
    <div class="item"><img src="image.png"></div>
    <div class="item"><img src="image.png"></div>
    <div class="item"><img src="image.png"></div>
    <div class="item"><img src="image.png"></div>
    <div class="item"><img src="image.png"></div>
    <div class="item"><img src="image.png"></div>
    <div class="item"><img src="image.png"></div>
    <div class="item"><img src="image.png"></div>
    <div class="item"><img src="image.png"></div>

  </div>

</div>

<script>
const orbit = document.getElementById("orbit");
const items = document.querySelectorAll(".item");
const video = document.getElementById("video");

let angle = 0;
const total = items.length;
const step = 360 / total;
let activeIndex = 0;

/* 👆 user interaction gate (fix autoplay error) */
let hasUserInteracted = false;
window.addEventListener("click", () => {
  hasUserInteracted = true;
}, { once: true });

/* 🪐 layout in circle */
function layout() {
  items.forEach((item, i) => {
    const theta = step * i;
    item.style.transform = `
      rotateY(${theta}deg)
      translateZ(500px)
    `;
  });
}
layout();

/* 🔄 smooth scroll rotation */
window.addEventListener("wheel", (e) => {
  angle += e.deltaY * 0.15;
  update();
});

/* 🎯 update active */
function update() {
  orbit.style.transform = `translate(-50%, -50%) rotateY(${angle}deg)`;

  let newIndex = Math.round((-angle / step) % total);
  if (newIndex < 0) newIndex += total;

  if (newIndex === activeIndex) return;

  activeIndex = newIndex;

  items.forEach((item, i) => {
    item.classList.remove("active", "inactive");

    if (i === activeIndex) {
      item.classList.add("active");
      handleActive(item);
    } else {
      item.classList.add("inactive");
    }
  });
}

/* 🎬 safe video play */
function handleActive(item) {
  const isVideo = item.dataset.type === "video";

  if (!isVideo) {
    video.pause();
    return;
  }

  if (!hasUserInteracted) return;

  video.currentTime = 0;

  const playPromise = video.play();
  if (playPromise !== undefined) {
    playPromise.catch(() => {});
  }
}

update();
</script>

</body>
</html>
